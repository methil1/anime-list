<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アニメ視聴備忘録</title>
<style>
  :root {
    --bg: #0d0e12;
    --bg-elev: #15171e;
    --bg-card: #1a1d26;
    --border: #272b36;
    --border-strong: #3a3f4d;
    --text: #e8eaef;
    --text-dim: #9aa0ad;
    --text-faint: #5f6675;
    --accent: #7c5cff;
    --accent-soft: #a48bff;
    --accent-glow: rgba(124, 92, 255, 0.4);
    --done: #34d399;
    --watching: #fbbf24;
    --maybe: #38bdf8;
    --dropped: #f87171;
    --planning: #f472b6;
    --radius: 12px;
    --radius-sm: 8px;
    --font: "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(124, 92, 255, 0.12), transparent 60%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 20px 100px; }

  /* Header */
  header { padding: 40px 0 18px; }
  .title-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; flex-wrap: wrap; }
  h1 { font-size: clamp(1.6rem, 1.1rem + 2vw, 2.5rem); font-weight: 800; letter-spacing: -0.02em; line-height: 1.05; }
  h1 .accent { background: linear-gradient(120deg, var(--accent-soft), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .subtitle { color: var(--text-dim); margin-top: 6px; font-size: 0.92rem; }
  .src-note { color: var(--text-faint); font-size: 0.76rem; margin-top: 4px; }

  .stats { display: flex; gap: 22px; margin-top: 22px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat .num { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .stat .lbl { color: var(--text-faint); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .stat.done .num { color: var(--done); }
  .stat.watching .num { color: var(--watching); }
  .stat.maybe .num { color: var(--maybe); }
  .stat.dropped .num { color: var(--dropped); }
  .stat.planning .num { color: var(--planning); }
  .collection-bar { margin-top: 22px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  body.hide-scores .poster .score { display: none; }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 26px; }
  .toolbar .tlabel { color: var(--text-faint); font-size: 0.78rem; }
  .search { flex: 1; min-width: 200px; position: relative; }
  .search input {
    width: 100%; background: var(--bg-elev); border: 1px solid var(--border); color: var(--text);
    padding: 11px 14px 11px 40px; border-radius: var(--radius-sm); font-size: 0.95rem; font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  .search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .search svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-faint); }

  .chips { display: flex; gap: 7px; flex-wrap: wrap; }
  .chip {
    background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim);
    padding: 9px 13px; border-radius: 999px; font-size: 0.83rem; cursor: pointer; font-family: inherit;
    transition: all .15s; white-space: nowrap;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 14px -4px var(--accent-glow); }
  .chip.done.active { background: var(--done); border-color: var(--done); color: #06281c; box-shadow: 0 4px 14px -4px rgba(52,211,153,.4); }
  .chip.watching.active { background: var(--watching); border-color: var(--watching); color: #3a2c05; box-shadow: 0 4px 14px -4px rgba(251,191,36,.4); }
  .chip.maybe.active { background: var(--maybe); border-color: var(--maybe); color: #07263b; box-shadow: 0 4px 14px -4px rgba(56,189,248,.4); }
  .chip.dropped.active { background: var(--dropped); border-color: var(--dropped); color: #2a0a0a; box-shadow: 0 4px 14px -4px rgba(248,113,113,.4); }
  .chip.planning.active { background: var(--planning); border-color: var(--planning); color: #3a0a25; box-shadow: 0 4px 14px -4px rgba(244,114,182,.4); }

  /* Year nav */
  .yearbar {
    display: flex; gap: 6px; overflow-x: auto; margin-top: 22px; padding-bottom: 6px;
    scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent;
  }
  .yearbar::-webkit-scrollbar { height: 6px; }
  .yearbar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  .ytab {
    background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim);
    padding: 8px 14px; border-radius: var(--radius-sm); font-size: 0.9rem; cursor: pointer; font-family: inherit;
    white-space: nowrap; font-variant-numeric: tabular-nums; transition: all .12s; font-weight: 600;
  }
  .ytab:hover { color: var(--text); border-color: var(--border-strong); }
  .ytab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .ytab.collection { color: var(--accent-soft); border-color: var(--border-strong); }
  .ytab.collection.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .yearbar-label { color: var(--text-faint); font-size: 0.78rem; margin: 40px 0 -10px; }

  /* 年代別折りたたみ（視聴コレクション） */
  .decade-block { margin-top: 56px; }
  .decade-block:first-child { margin-top: 24px; }
  .decade-head { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
    font-size: 2.5rem; font-weight: 900; letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
    padding-bottom: 10px; border-bottom: 2px solid var(--accent); margin-bottom: 4px; color: var(--accent-soft); }
  .decade-head-toggle { font-size: 1.1rem; min-width: 1.2em; color: var(--text-faint); }
  .decade-block.collapsed .decade-block-content { display: none; }
  .decade-block.collapsed .decade-head { margin-bottom: 0; }
  .decade-block .year-block { margin-top: 30px; }

  /* 年別折りたたみ */
  .year-head { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .year-head-toggle { font-size: 0.9rem; min-width: 1.2em; }
  .year-block.collapsed .year-block-content { display: none; }

  /* Section headings */
  .year-block { margin-top: 40px; }
  .year-head { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 6px; font-variant-numeric: tabular-nums; }
  .cour { margin-top: 26px; }
  .cour-head { display: flex; align-items: baseline; gap: 12px; border-bottom: 1px solid var(--border); padding-bottom: 9px; margin-bottom: 16px; cursor: pointer; user-select: none; }
  .cour-head-toggle { font-size: 0.8rem; min-width: 1.1em; color: var(--text-faint); }
  .cour-head.s-recent { cursor: default; }
  .cour.collapsed .grid { display: none; }
  .cour.collapsed .cour-head { margin-bottom: 0; }
  .cour-head .season { font-size: 1.15rem; font-weight: 700; }
  .cour-head .count { color: var(--text-faint); font-size: 0.82rem; }
  .cour-head .line { flex: 1; }
  .s-winter { color: #7dd3fc; }
  .s-spring { color: #f9a8d4; }
  .s-summer { color: #fcd34d; }
  .s-fall   { color: #fdba74; }
  .s-ova    { color: #5eead4; }
  .s-movie  { color: #c4b5fd; }
  .s-recent { color: var(--accent-soft); }

  /* Poster grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
  .poster {
    position: relative; cursor: pointer; border-radius: var(--radius); overflow: hidden;
    background: var(--bg-card); border: 2px solid var(--border);
    transition: transform .15s, border-color .15s, box-shadow .15s;
    user-select: none;
  }
  .poster:hover { transform: translateY(-3px); box-shadow: 0 12px 26px -12px rgba(0,0,0,.8); }
  .poster.done { border-color: var(--done); }
  .poster.watching { border-color: var(--watching); }
  .poster.maybe { border-color: var(--maybe); }
  .poster .img { aspect-ratio: 2/3; width: 100%; object-fit: cover; display: block; background: var(--bg-elev); }
  .poster .noimg { aspect-ratio: 2/3; display: grid; place-items: center; color: var(--text-faint); font-size: 0.8rem; padding: 10px; text-align: center; }

  .poster .meta {
    position: absolute; inset: auto 0 0 0; padding: 22px 9px 9px;
    background: linear-gradient(transparent, rgba(8,9,12,.95)55%);
  }
  .poster .ttl { font-size: 0.82rem; font-weight: 700; line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .poster .sub { font-size: 0.68rem; color: var(--text-dim); margin-top: 3px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .poster .ep { font-variant-numeric: tabular-nums; }
  .poster .multi { background: var(--accent); color: #fff; font-weight: 700; padding: 1px 6px; border-radius: 999px; font-size: 0.64rem; }
  .poster .fmt { font-weight: 700; padding: 1px 6px; border-radius: 999px; font-size: 0.64rem; }
  .poster .fmt.short { background: #0e7490; color: #cffafe; }
  .poster .fmt.ova { background: #0f766e; color: #ccfbf1; }
  .poster .fmt.movie { background: #7c3aed; color: #fff; }

  /* status corner */
  .poster .status { position: absolute; top: 7px; right: 7px; width: 26px; height: 26px; border-radius: 50%; display: none; place-items: center; box-shadow: 0 2px 8px rgba(0,0,0,.5); }
  .poster.done .status { display: grid; background: var(--done); color: #06281c; }
  .poster.watching .status { display: grid; background: var(--watching); color: #3a2c05; }
  .poster.maybe .status { display: grid; background: var(--maybe); color: #07263b; }
  .poster .status svg { width: 15px; height: 15px; }
  .poster .status .qmark { font-weight: 800; font-size: 15px; line-height: 1; }
  .poster.dropped { border-color: var(--dropped); }
  .poster.dropped .status { display: grid; background: var(--dropped); color: #2a0a0a; }
  .poster.planning { border-color: var(--planning); }
  .poster.planning .status { display: grid; background: var(--planning); color: #3a0a25; }
  .poster .status .xmark { font-weight: 800; font-size: 17px; line-height: 1; }
  .poster .prog { font-weight: 700; padding: 1px 6px; border-radius: 999px; font-size: 0.64rem; background: rgba(251,191,36,.22); color: var(--watching); }
  .poster .prog.dropped { background: rgba(248,113,113,.2); color: var(--dropped); }
  .poster .myrate { font-weight: 700; padding: 1px 6px; border-radius: 999px; font-size: 0.64rem; background: rgba(124,92,255,.25); color: var(--accent-soft); }
  .poster .score { position: absolute; top: 7px; left: 7px; background: rgba(8,9,12,.78); color: #fcd34d; font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; }

  /* empty / loading */
  .notice { text-align: center; padding: 80px 20px; color: var(--text-faint); }
  .notice .big { font-size: 2.6rem; margin-bottom: 10px; }
  .notice code { background: var(--bg-elev); padding: 2px 8px; border-radius: 6px; color: var(--accent-soft); }

  .foot-note { margin-top: 30px; text-align: center; color: var(--text-faint); font-size: 0.8rem; }
  .foot-note a { color: var(--text-dim); cursor: pointer; text-decoration: underline; }
  .src-credit { margin-top: 18px; text-align: right; color: var(--text-faint); font-size: 0.72rem; }
  .src-credit a { color: var(--text-dim); text-decoration: none; }
  .src-credit a:hover { text-decoration: underline; }

  /* toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg-card); border: 1px solid var(--border-strong); color: var(--text); padding: 11px 18px; border-radius: 999px; font-size: 0.88rem; box-shadow: 0 12px 30px -10px rgba(0,0,0,.7); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 60; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Context menu (右クリック) */
  .ctx-menu { position: fixed; z-index: 70; min-width: 190px; max-width: 290px; background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); box-shadow: 0 16px 40px -12px rgba(0,0,0,.8); padding: 6px; display: none; }
  .ctx-menu.show { display: block; }
  .ctx-menu .ctx-title { padding: 7px 10px 6px; font-size: 0.78rem; color: var(--text-faint); border-bottom: 1px solid var(--border); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctx-menu .ctx-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; font-size: 0.86rem; color: var(--text); cursor: pointer; user-select: none; }
  .ctx-menu .ctx-item:hover { background: var(--bg-elev); color: var(--accent-soft); }
  .ctx-menu .ctx-stars { display: flex; gap: 3px; padding: 7px 10px 8px; }
  .ctx-menu .ctx-star { cursor: pointer; font-size: 1.2rem; line-height: 1; color: var(--text-faint); transition: color .1s; }
  .ctx-menu .ctx-star.on { color: #fcd34d; }
  .ctx-menu .ctx-star:hover { color: #fde68a; }
  .ctx-menu .ctx-seclabel { padding: 4px 10px 3px; font-size: 0.72rem; color: var(--text-faint); }
  .ctx-menu .ctx-states { display: flex; flex-wrap: wrap; gap: 4px; padding: 2px 8px 4px; }
  .ctx-menu .ctx-state { padding: 5px 9px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--border); color: var(--text-dim); user-select: none; white-space: nowrap; }
  .ctx-menu .ctx-state:hover { border-color: var(--border-strong); color: var(--text); }
  .ctx-menu .ctx-state.cur { border-color: var(--accent); color: #fff; background: var(--accent); }
  .ctx-menu .ctx-ep { display: flex; align-items: center; gap: 6px; padding: 3px 10px 8px; font-size: 0.78rem; color: var(--text-dim); }
  .ctx-menu .ctx-ep input { width: 60px; background: var(--bg-elev); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 6px; font-family: inherit; font-size: 0.82rem; }
  .ctx-menu .ctx-divider { height: 1px; background: var(--border); margin: 5px 4px; }
  /* ホバー情報カード（作品名/原作/制作/メインキャラ） */
  .info-card { position: fixed; z-index: 65; min-width: 200px; max-width: 300px; background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); box-shadow: 0 16px 40px -12px rgba(0,0,0,.85); padding: 11px 13px; display: none; pointer-events: none; }
  .info-card.show { display: block; }
  .info-card .ic-title { font-size: 0.9rem; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 7px; }
  .info-card .ic-row { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 3px; display: flex; gap: 7px; }
  .info-card .ic-k { flex: 0 0 auto; color: var(--text-faint); }
  .info-card .ic-narou { color: var(--accent-soft); font-size: 0.7rem; border: 1px solid var(--border-strong); padding: 0 6px; border-radius: 999px; align-self: center; }
  .info-card .ic-chars { margin-top: 8px; padding-top: 7px; border-top: 1px solid var(--border); display: grid; gap: 3px; }
  .info-card .ic-char { font-size: 0.81rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .info-card .ic-cv { color: var(--accent-soft); }
  .info-card .ic-more { color: var(--text-faint); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-row">
      <div>
        <h1>アニメ<span class="accent">視聴備忘録</span></h1>
        <p class="subtitle">左クリックで視聴済／多分視聴済／未マークを切替。右クリックで全ステータス（視聴中・視聴中止の話数）と自分の評価（★1-5）を設定できます。</p>
        <p class="src-note" id="src-note"></p>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="collection-bar">
    <button class="ytab collection" id="collection-btn" onclick="goCollection()">★ 視聴コレクション</button>
    <button class="ytab collection" id="recent-btn" onclick="goRecent()">🆕 新着</button>
    <button class="ytab" id="score-btn" onclick="toggleScores()">★ 評価値を表示</button>
  </div>

  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input type="text" id="search" placeholder="作品名で検索（全年代）..." oninput="onSearch()">
    </div>
    <div class="chips" id="filters">
      <button class="chip active" data-f="all" onclick="setFilter('all')">すべて</button>
      <button class="chip done" data-f="done" onclick="setFilter('done')">視聴済</button>
      <button class="chip watching" data-f="watching" onclick="setFilter('watching')">視聴中</button>
      <button class="chip planning" data-f="planning" onclick="setFilter('planning')">視聴予定</button>
      <button class="chip dropped" data-f="dropped" onclick="setFilter('dropped')">視聴中止</button>
      <button class="chip maybe" data-f="maybe" onclick="setFilter('maybe')">多分視聴済</button>
      <button class="chip" data-f="unwatched" onclick="setFilter('unwatched')">未マーク</button>
    </div>
  </div>

  <div class="toolbar" style="margin-top:10px">
    <span class="tlabel">形式</span>
    <div class="chips" id="formatfilters">
      <button class="chip active" data-ff="all" onclick="setFormat('all')">すべて</button>
      <button class="chip" data-ff="TV" onclick="setFormat('TV')">TV</button>
      <button class="chip" data-ff="SHORT" onclick="setFormat('SHORT')">ショート</button>
      <button class="chip" data-ff="OVA" onclick="setFormat('OVA')">OVA</button>
      <button class="chip" data-ff="MOVIE" onclick="setFormat('MOVIE')">劇場アニメ</button>
    </div>
  </div>

  <div class="yearbar" id="yearbar"></div>

  <div id="list"></div>

  <p class="yearbar-label">年で移動</p>
  <div class="yearbar" id="yearbar-bottom"></div>

  <div class="foot-note">
    視聴状況はこのブラウザ内（localStorage）に保存されます。 ·
    <a onclick="openExportMenu(event)">視聴履歴を書き出し（JSON / CSV / JPEG）</a> ·
    <a onclick="importWatch()">読み込み</a>
  </div>

  <p class="src-credit">データ: <a href="https://anilist.co" target="_blank" rel="noopener">AniList (https://anilist.co)</a></p>
</div>

<div class="toast" id="toast"></div>
<div class="ctx-menu" id="ctxmenu"></div>
<div class="ctx-menu" id="exportmenu"></div>
<div class="info-card" id="infocard"></div>

<script>
const WATCH_KEY = "animeTV.watch.v1";
const SEASON_JA = { WINTER: "冬", SPRING: "春", SUMMER: "夏", FALL: "秋", OVA: "OVA", MOVIE: "劇場アニメ" };
const SEASON_CLS = { WINTER: "s-winter", SPRING: "s-spring", SUMMER: "s-summer", FALL: "s-fall", OVA: "s-ova", MOVIE: "s-movie" };
const SEASON_ORDER = { WINTER: 0, SPRING: 1, SUMMER: 2, FALL: 3, OVA: 4, MOVIE: 5 };
// 表示用の並び順: クールは秋→夏→春→冬の降順（新しいクールを上に＝見やすく）。
// OVA・劇場版は従来どおり全クールの後ろ（順番は変えない）。
const SEASON_ORDER_DISPLAY = { FALL: 0, SUMMER: 1, SPRING: 2, WINTER: 3, OVA: 4, MOVIE: 5 };
const CURRENT_YEAR = new Date().getFullYear();
// 現行年は放送進行に沿った暦順（冬→秋）、過去年は逆順（秋→冬）で表示する。
function seasonOrder(year) { return year === CURRENT_YEAR ? SEASON_ORDER : SEASON_ORDER_DISPLAY; }
// 左クリックは「視聴済→多分視聴済→未マーク」の3状態のみを巡回（視聴中/視聴中止は右クリックから設定）。
const LEFT_NEXT = { unwatched: "done", done: "maybe", maybe: "unwatched" };
const STATUS_JA = { done: "視聴済", watching: "視聴中", planning: "視聴予定", dropped: "視聴中止", maybe: "多分視聴済", unwatched: "未マーク" };
// 右クリックメニューで選べる全状態（表示順）
const CTX_STATES = [["unwatched", "未マーク"], ["planning", "視聴予定"], ["watching", "視聴中"], ["done", "視聴済"], ["dropped", "視聴中止"], ["maybe", "多分視聴済"]];
const FMT_JA = { TV: "TV", SHORT: "ショート", OVA: "OVA", MOVIE: "劇場アニメ" };
// 複数選択フィルタの対象キー（「すべて」= 全キー選択状態）
const STATUS_KEYS = ["done", "watching", "planning", "maybe", "dropped", "unwatched"];
const FORMAT_KEYS = ["TV", "SHORT", "OVA", "MOVIE"];

let catalog = [];
let years = [];
let watch = loadWatch();
let view = { mode: "year", year: null };   // mode: "year" | "collection"
let query = "";
let statusFilter = new Set(STATUS_KEYS);   // 複数選択（既定: 全選択 = すべて）
let formatFilter = new Set(FORMAT_KEYS);    // 複数選択（既定: 全選択 = すべて）
let showScores = false;   // 評価値（★）の表示。デフォルト非表示
let collapsedDecades = new Set(); // 折りたたみ中の年代（collection モード用、キー=10年区切りの開始年）
let collapsedYears = new Set();   // 折りたたみ中の年（collection モード用）
let collapsedCours = new Set();   // 折りたたみ中のクール（キー=`${year}-${season}`）

/* ---------- persistence ----------
   watch[id] = { s: 状態, ep: 話数, r: 自分評価1-5 }。
   旧形式（watch[id] = "状態" の文字列）は読み込み時にオブジェクトへ移行する。 */
function migrateWatch(raw) {
  const out = {};
  if (!raw || typeof raw !== "object") return out;
  for (const id in raw) {
    const v = raw[id];
    if (typeof v === "string") { if (v && v !== "unwatched") out[id] = { s: v }; }
    else if (v && typeof v === "object") {
      const e = {};
      if (v.s && v.s !== "unwatched") e.s = v.s;
      if (v.ep > 0) e.ep = v.ep;
      if (v.r > 0) e.r = v.r;
      if (e.s || e.r) out[id] = e;
    }
  }
  return out;
}
function loadWatch() {
  try { const r = localStorage.getItem(WATCH_KEY); if (r) return migrateWatch(JSON.parse(r)); }
  catch (e) { console.error(e); }
  return {};
}
function saveWatch() {
  try { localStorage.setItem(WATCH_KEY, JSON.stringify(watch)); }
  catch (e) { alert("保存に失敗: " + e.message); }
}
function statusOf(id) { return (watch[id] && watch[id].s) || "unwatched"; }
function epOf(id) { return (watch[id] && watch[id].ep) || 0; }
function ratingOf(id) { return (watch[id] && watch[id].r) || 0; }

// 状態を設定。unwatched は状態を消すが自分評価は保持する。
function setStatus(id, status, ep) {
  const cur = watch[id] || {};
  const e = {};
  if (cur.r > 0) e.r = cur.r;
  if (status && status !== "unwatched") {
    e.s = status;
    if ((status === "watching" || status === "dropped") && ep > 0) e.ep = ep;
  }
  if (e.s || e.r) watch[id] = e; else delete watch[id];
  saveWatch();
}
// 視聴話数（視聴中/視聴中止のみ保持）。
function setEp(id, val) {
  const cur = watch[id]; if (!cur || (cur.s !== "watching" && cur.s !== "dropped")) return;
  const n = parseInt(val, 10);
  if (n > 0) cur.ep = n; else delete cur.ep;
  saveWatch();
  renderStats(); updatePoster(id);
}
// 自分評価（1-5。同じ星を再クリックで解除）。
function setRating(id, r) {
  const cur = watch[id] || {};
  if (r > 0) cur.r = r; else delete cur.r;
  if (cur.s || cur.r) watch[id] = cur; else delete watch[id];
  saveWatch();
}

/* ---------- helpers ---------- */
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
function courLabel(ep) {
  if (!ep) return null;
  if (ep > 13) return { multi: true, text: ep > 52 ? "長期" : "連続" + Math.max(2, Math.round(ep / 13)) + "クール" };
  return null;
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 1400);
}

/* ---------- init ---------- */
function init() {
  const cat = window.ANIME_CATALOG;
  if (!cat || !Array.isArray(cat.anime) || cat.anime.length === 0) {
    document.getElementById("list").innerHTML = `<div class="notice">
      <div class="big">⏳</div>
      <p>カタログデータ（<code>anime-data.js</code>）がまだありません。</p>
      <p style="margin-top:10px">ターミナルで <code>python scrape_anime.py</code> を実行してデータを生成し、ページを再読み込みしてください。</p>
    </div>`;
    return;
  }
  catalog = cat.anime;
  years = [...new Set(catalog.map(a => a.y))].sort((a, b) => b - a);
  view.year = years[0];
  document.getElementById("src-note").textContent =
    `生成日 ${cat.created || cat.generated} ／ 更新日 ${cat.generated}`;
  applyScoreVisibility();
  syncChips("filters", "f", statusFilter, STATUS_KEYS);
  syncChips("formatfilters", "ff", formatFilter, FORMAT_KEYS);
  renderYearbar();
  render();
  syncYearbars();
}

/* ---------- yearbar sync ---------- */
function syncYearbars() {
  const top = document.getElementById("yearbar");
  const bottom = document.getElementById("yearbar-bottom");
  if (!top || !bottom) return;
  let syncing = false;
  const sync = (from, to) => {
    if (!syncing) { syncing = true; to.scrollLeft = from.scrollLeft; syncing = false; }
  };
  top.addEventListener("scroll", () => sync(top, bottom));
  bottom.addEventListener("scroll", () => sync(bottom, top));
}

/* ---------- score visibility ---------- */
function applyScoreVisibility() {
  document.body.classList.toggle("hide-scores", !showScores);
  const btn = document.getElementById("score-btn");
  if (btn) {
    btn.classList.toggle("active", showScores);
    btn.textContent = showScores ? "★ 評価値を非表示" : "★ 評価値を表示";
  }
}
function toggleScores() { showScores = !showScores; applyScoreVisibility(); }

/* ---------- year nav ---------- */
function yearbarHtml() {
  return years.map(y =>
    `<button class="ytab ${view.mode === "year" && view.year === y ? "active" : ""}" onclick="goYear(${y})">${y}</button>`
  ).join("");
}
function renderYearbar() {
  const html = yearbarHtml();
  document.getElementById("yearbar").innerHTML = html;
  const bottom = document.getElementById("yearbar-bottom");
  if (bottom) bottom.innerHTML = html;
  const cb = document.getElementById("collection-btn");
  if (cb) cb.classList.toggle("active", view.mode === "collection");
  const rb = document.getElementById("recent-btn");
  if (rb) rb.classList.toggle("active", view.mode === "recent");
}
function goYear(y) { view = { mode: "year", year: y }; query = ""; document.getElementById("search").value = ""; renderYearbar(); render(); window.scrollTo({ top: 0, behavior: "smooth" }); }
function goCollection() { view = { mode: "collection", year: null }; query = ""; document.getElementById("search").value = ""; renderYearbar(); render(); window.scrollTo({ top: 0, behavior: "smooth" }); }
const decadeOf = y => Math.floor(y / 10) * 10;

// 折りたたみ状態を明示的にセット（DOM とクラス・トグル記号を同期）
function setDecadeCollapsed(d, collapsed) {
  if (collapsed) collapsedDecades.add(d); else collapsedDecades.delete(d);
  const block = document.getElementById(`decade-${d}`);
  if (!block) return;
  block.classList.toggle("collapsed", collapsed);
  const t = block.querySelector(".decade-head-toggle");
  if (t) t.textContent = collapsed ? "▶" : "▼";
}
function setYearCollapsed(y, collapsed) {
  if (collapsed) collapsedYears.add(y); else collapsedYears.delete(y);
  const block = document.getElementById(`year-${y}`);
  if (!block) return;
  block.classList.toggle("collapsed", collapsed);
  const t = block.querySelector(".year-head-toggle");
  if (t) t.textContent = collapsed ? "▶" : "▼";
}
// その年のクールが全て畳まれたら年も自動で畳む → さらに年代へ伝播
function maybeAutoFoldYear(y) {
  const block = document.getElementById(`year-${y}`);
  if (!block || collapsedYears.has(y)) return;
  const cours = block.querySelectorAll(".cour");
  if (cours.length === 0) return;
  if (Array.from(cours).every(c => c.classList.contains("collapsed"))) {
    setYearCollapsed(y, true);
    maybeAutoFoldDecade(decadeOf(y));
  }
}
// その年代の年が全て畳まれたら年代も自動で畳む
function maybeAutoFoldDecade(d) {
  const block = document.getElementById(`decade-${d}`);
  if (!block || collapsedDecades.has(d)) return;
  const yblocks = block.querySelectorAll(".year-block");
  if (yblocks.length === 0) return;
  if (Array.from(yblocks).every(b => b.classList.contains("collapsed"))) {
    setDecadeCollapsed(d, true);
  }
}
function toggleDecade(d) {
  setDecadeCollapsed(d, !collapsedDecades.has(d));
}
function toggleYear(y) {
  const collapsed = !collapsedYears.has(y);
  setYearCollapsed(y, collapsed);
  if (collapsed && view.mode === "collection") maybeAutoFoldDecade(decadeOf(y));
}
function toggleCour(key) {
  const block = document.getElementById(`cour-${key}`);
  if (!block) return;
  const collapsed = !collapsedCours.has(key);
  if (collapsed) collapsedCours.add(key); else collapsedCours.delete(key);
  block.classList.toggle("collapsed", collapsed);
  const toggle = block.querySelector(".cour-head-toggle");
  if (toggle) toggle.textContent = collapsed ? "▶" : "▼";
  if (collapsed && view.mode === "collection") maybeAutoFoldYear(Number(key.split("-")[0]));
}
function goRecent() { view = { mode: "recent", year: null }; query = ""; document.getElementById("search").value = ""; renderYearbar(); render(); window.scrollTo({ top: 0, behavior: "smooth" }); }

/* ---------- filters（複数選択トグル） ----------
   「すべて」= 全選択状態（個別チップが全点灯）。
   ・全選択中に「すべて」を押すと全選択解除。
   ・「すべて」以外を押すと、そのキーだけをトグル（全選択状態からは1つ外れる）。 */
function toggleFilterSet(set, keys, value) {
  if (value === "all") {
    if (set.size === keys.length) set.clear();          // 全選択 → 全解除
    else { set.clear(); keys.forEach(k => set.add(k)); } // それ以外 → 全選択
  } else {
    if (set.has(value)) set.delete(value); else set.add(value);
  }
}
function syncChips(containerId, attr, set, keys) {
  document.querySelectorAll(`#${containerId} .chip`).forEach(c => {
    const v = c.dataset[attr];
    const active = v === "all" ? set.size === keys.length : set.has(v);
    c.classList.toggle("active", active);
  });
}
function setFilter(f) {
  toggleFilterSet(statusFilter, STATUS_KEYS, f);
  syncChips("filters", "f", statusFilter, STATUS_KEYS);
  render();
}
function setFormat(f) {
  toggleFilterSet(formatFilter, FORMAT_KEYS, f);
  syncChips("formatfilters", "ff", formatFilter, FORMAT_KEYS);
  render();
}
function onSearch() { query = document.getElementById("search").value.trim().toLowerCase(); render(); }

// 状態フィルタと形式フィルタをまとめて適用（render の全分岐で使用）
function passStatus(a) {
  if (!formatFilter.has(a.f)) return false;
  return statusFilter.has(statusOf(a.id));
}

/* ---------- stats ---------- */
function renderStats() {
  let done = 0, watching = 0, maybe = 0, dropped = 0, planning = 0;
  for (const id in watch) { const v = (watch[id] || {}).s; if (v === "done") done++; else if (v === "watching") watching++; else if (v === "maybe") maybe++; else if (v === "dropped") dropped++; else if (v === "planning") planning++; }
  document.getElementById("stats").innerHTML = `
    <div class="stat done"><span class="num">${done}</span><span class="lbl">視聴済</span></div>
    <div class="stat watching"><span class="num">${watching}</span><span class="lbl">視聴中</span></div>
    <div class="stat planning"><span class="num">${planning}</span><span class="lbl">視聴予定</span></div>
    <div class="stat dropped"><span class="num">${dropped}</span><span class="lbl">視聴中止</span></div>
    <div class="stat maybe"><span class="num">${maybe}</span><span class="lbl">多分視聴済</span></div>
    <div class="stat"><span class="num">${catalog.length.toLocaleString()}</span><span class="lbl">カタログ作品</span></div>`;
}

/* ---------- main render ---------- */
function render() {
  renderStats();
  const list = document.getElementById("list");

  if (view.mode === "recent" && !query) { renderRecent(list); return; }

  let items;
  let grouped = true; // year+season grouping vs single year

  if (query) {
    items = catalog.filter(a => passStatus(a) &&
      ((a.t && a.t.toLowerCase().includes(query)) || (a.tr && a.tr.toLowerCase().includes(query))));
  } else if (view.mode === "collection") {
    items = catalog.filter(a => statusOf(a.id) !== "unwatched" && passStatus(a));
  } else {
    items = catalog.filter(a => a.y === view.year && passStatus(a));
    grouped = false;
  }

  if (items.length === 0) {
    let msg;
    if (query) {
      msg = "該当する作品がありません。";
    } else if (view.mode === "collection") {
      msg = "まだ視聴済み・視聴中の作品がありません。気になるクールから探してみましょう。";
    } else {
      msg = "この条件の作品がありません。";
    }
    list.innerHTML = `<div class="notice"><div class="big">🔍</div><p>${msg}</p></div>`;
    return;
  }

  if (!grouped) {
    const countText = countBreakdown(items);
    list.innerHTML = `<div class="year-block"><div class="year-head"><span>${view.year}年 <span style="color:var(--text-faint);font-size:0.85rem">${countText}</span></span></div><div class="year-block-content">${seasonGroupsHtml(items, view.year)}</div></div>`;
  } else {
    const byYear = {};
    for (const a of items) (byYear[a.y] = byYear[a.y] || []).push(a);
    const ys = Object.keys(byYear).map(Number).sort((x, y) => y - x);
    const isCollection = view.mode === "collection";
    if (isCollection) {
      // 年を 10年ごとの「年代」枠でまとめる（折りたたみ可・自動折りたたみ対応）
      const byDecade = {};
      for (const y of ys) (byDecade[decadeOf(y)] = byDecade[decadeOf(y)] || []).push(y);
      const decades = Object.keys(byDecade).map(Number).sort((a, b) => b - a);
      list.innerHTML = decades.map(d => {
        const collapsed = collapsedDecades.has(d);
        const decYears = byDecade[d];
        const decItems = decYears.flatMap(y => byYear[y]);
        const countText = countBreakdown(decItems);
        const label = `${d}年代 <span style="color:var(--text-faint);font-size:0.9rem;font-weight:600">${countText}</span>`;
        return `<div class="decade-block ${collapsed ? "collapsed" : ""}" id="decade-${d}">
          <div class="decade-head" onclick="toggleDecade(${d})">
            <span class="decade-head-toggle">${collapsed ? "▶" : "▼"}</span><span>${label}</span>
          </div>
          <div class="decade-block-content">${decYears.map(y => yearBlockHtml(y, byYear[y], true)).join("")}</div>
        </div>`;
      }).join("");
    } else {
      list.innerHTML = ys.map(y => yearBlockHtml(y, byYear[y], false)).join("");
    }
  }
}

function countBreakdown(arr) {
  const short = arr.filter(a => a.f === "SHORT").length;
  const ova = arr.filter(a => a.f === "OVA").length;
  const movie = arr.filter(a => a.f === "MOVIE").length;
  const parts = [];
  if (short) parts.push(`ショート${short}作品`);
  if (ova) parts.push(`OVA${ova}作品`);
  if (movie) parts.push(`映画${movie}作品`);
  return parts.length ? `${arr.length}作品（内${parts.join("・")}）` : `${arr.length}作品`;
}
function yearBlockHtml(y, yearItems, isCollection) {
  const collapsed = collapsedYears.has(y);
  const toggle = isCollection ? `<span class="year-head-toggle" onclick="toggleYear(${y}); event.stopPropagation()">${collapsed ? "▶" : "▼"}</span>` : "";
  const headBtn = isCollection ? `onclick="toggleYear(${y})"` : "";
  const countText = countBreakdown(yearItems);
  const yearLabel = `${y}年 <span style="color:var(--text-faint);font-size:0.85rem">${countText}</span>`;
  return `<div class="year-block ${collapsed ? "collapsed" : ""}" id="year-${y}">
    <div class="year-head" ${headBtn}>${toggle}<span>${yearLabel}</span></div>
    <div class="year-block-content">${seasonGroupsHtml(yearItems, y)}</div>
  </div>`;
}

function renderRecent(list) {
  const items = catalog.filter(a => a.a && passStatus(a));
  if (items.length === 0) {
    list.innerHTML = `<div class="notice"><div class="big">🆕</div><p>新着作品がありません。</p></div>`;
    return;
  }
  list.innerHTML = `<div class="year-block">${recentGroupsHtml(items)}</div>`;
}
function recentGroupsHtml(items) {
  const byDate = {};
  for (const a of items) (byDate[a.a] = byDate[a.a] || []).push(a);
  const dates = Object.keys(byDate).sort().reverse();
  return dates.map(d => {
    const arr = byDate[d].slice().sort((x, y) => (y.y - x.y) || ((y.sc || 0) - (x.sc || 0)));
    const shortCount = arr.filter(a => a.f === "SHORT").length;
    const countText = shortCount ? `${arr.length}作品（内ショート${shortCount}作品）` : `${arr.length}作品`;
    return `<section class="cour">
      <div class="cour-head s-recent">
        <span class="season">${d} に追加</span>
        <span class="count">${countText}</span>
        <span class="line"></span>
      </div>
      <div class="grid">${arr.map(posterHtml).join("")}</div>
    </section>`;
  }).join("");
}
function seasonGroupsHtml(items, year) {
  const bySeason = {};
  for (const a of items) (bySeason[a.s] = bySeason[a.s] || []).push(a);
  // 視聴コレクションは現行年も含め全年を逆順（秋→冬）。年別ページのみ現行年は暦順を維持。
  const order = view.mode === "collection" ? SEASON_ORDER_DISPLAY : seasonOrder(year);
  const seasons = Object.keys(bySeason).sort((a, b) => (order[a] ?? 9) - (order[b] ?? 9));
  return seasons.map(s => {
    // OVA/劇場は年別カテゴライズなので評価値順だと分かりづらい → 発売/公開日(d)順に並べる。
    // クール(冬春夏秋)は従来どおり評価値の高い順。日付欠落は末尾、同日は評価値順。
    const isYearly = s === "OVA" || s === "MOVIE";
    const arr = bySeason[s].slice().sort(isYearly
      ? (a, b) => (a.d || Infinity) - (b.d || Infinity) || (b.sc || 0) - (a.sc || 0)
      : (a, b) => (b.sc || 0) - (a.sc || 0));
    const shortCount = arr.filter(a => a.f === "SHORT").length;
    const countText = shortCount ? `${arr.length}作品（内ショート${shortCount}作品）` : `${arr.length}作品`;
    const isCour = ["WINTER", "SPRING", "SUMMER", "FALL"].includes(s);
    const label = isCour ? `${year}年 ${SEASON_JA[s] || s}クール` : `${year}年 ${SEASON_JA[s] || s}`;
    const courKey = `${year}-${s}`;
    const courCollapsed = collapsedCours.has(courKey);
    return `<section class="cour ${courCollapsed ? "collapsed" : ""}" id="cour-${courKey}">
      <div class="cour-head ${SEASON_CLS[s] || ""}" onclick="toggleCour('${courKey}')">
        <span class="cour-head-toggle">${courCollapsed ? "▶" : "▼"}</span>
        <span class="season">${label}</span>
        <span class="count">${countText}</span>
        <span class="line"></span>
      </div>
      <div class="grid">${arr.map(posterHtml).join("")}</div>
    </section>`;
  }).join("");
}

function statusIcon(st) {
  if (st === "done") return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  if (st === "maybe") return '<span class="qmark">?</span>';
  if (st === "dropped") return '<span class="xmark">×</span>';
  if (st === "planning") return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2h12a1 1 0 011 1v19l-7-4.2L5 22V3a1 1 0 011-1z"/></svg>';
  return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
}
function posterHtml(a) {
  const st = statusOf(a.id);
  const isMovie = a.f === "MOVIE";
  const isOva = a.f === "OVA";
  const cl = (isMovie || isOva) ? null : courLabel(a.ep);
  const epText = isMovie ? "劇場版" : (a.ep ? `全${a.ep}話` : (isOva ? "OVA" : "話数未定"));
  const fmtBadge = a.f === "SHORT" ? '<span class="fmt short">ショート</span>'
                 : isOva ? '<span class="fmt ova">OVA</span>'
                 : isMovie ? '<span class="fmt movie">劇場</span>' : "";
  const ep = epOf(a.id);
  const prog = st === "watching" ? `<span class="prog">▶${ep ? ep + "話" : "視聴中"}</span>`
             : st === "dropped" ? `<span class="prog dropped">■${ep ? ep + "話で" : ""}中止</span>` : "";
  const r = ratingOf(a.id);
  const myRate = r ? `<span class="myrate">★${r}</span>` : "";
  const img = a.img
    ? `<img class="img" loading="lazy" src="${esc(a.img)}" alt="" onerror="this.outerHTML='<div class=&quot;noimg&quot;>${esc(a.t)}</div>'">`
    : `<div class="noimg">${esc(a.t)}</div>`;
  return `<article class="poster ${st}" onclick="cycle(${a.id})" oncontextmenu="return showCtxMenu(event,${a.id})" onmouseenter="showInfo(event,${a.id})" onmouseleave="hideInfo()">
    ${img}
    ${a.sc ? `<span class="score">★${(a.sc / 10).toFixed(1)}</span>` : ""}
    <span class="status">${statusIcon(st)}</span>
    <div class="meta">
      <div class="ttl">${esc(a.t)}</div>
      <div class="sub">
        <span class="ep">${epText}</span>
        ${cl ? `<span class="multi">${cl.text}</span>` : ""}
        ${fmtBadge}
        ${prog}
        ${myRate}
      </div>
    </div>
  </article>`;
}

/* ---------- marking ---------- */
function cycle(id) {
  const cur = statusOf(id);
  let next;
  if (cur === "watching" || cur === "dropped") {
    // 話数を入れた視聴中/視聴中止は、誤クリックでも話数を失わないよう両者のトグルだけにする。
    next = cur === "watching" ? "dropped" : "watching";
    setStatus(id, next, epOf(id));
  } else {
    next = LEFT_NEXT[cur] || "done";   // 未マーク/視聴済/多分視聴済/視聴予定 → 3状態巡回
    setStatus(id, next, null);
  }
  renderStats();
  // 視聴コレクション表示中も、未視聴に戻した作品はその場では消さずポスターのみ更新（誤クリック対策）。
  // 次回のページ偏移（年タブ/コレクション/検索など）で再描画され、自然に除外される。
  updatePoster(id);
  toast(STATUS_JA[next] + " にしました");
}
/* ---------- 右クリックメニュー ---------- */
let ctxOpenedAt = 0;
let ctxPos = { x: 0, y: 0 };
const STAT_ICON = { unwatched: "·", planning: "🔖", watching: "▶", done: "✓", dropped: "×", maybe: "?" };
function ctxInner(a) {
  const id = a.id;
  const cur = statusOf(id), r = ratingOf(id), ep = epOf(id);
  const stars = [1, 2, 3, 4, 5].map(n =>
    `<span class="ctx-star ${n <= r ? "on" : ""}" onclick="event.stopPropagation();pickRating(${id},${n})">★</span>`
  ).join("");
  const states = CTX_STATES.map(([k, label]) =>

  ).join("");
  const epRow = (cur === "watching" || cur === "dropped")
    ? `<div class="ctx-ep" onclick="event.stopPropagation()">${cur === "dropped" ? "中止話数" : "視聴話数"}
         <input type="number" min="1" inputmode="numeric" value="${ep || ""}" placeholder="—"
                onclick="event.stopPropagation()" oninput="setEp(${id},this.value)"> 話</div>`
    : "";
  return `
    <div class="ctx-title">${esc(a.t)}</div>
    <div class="ctx-stars" onclick="event.stopPropagation()" title="自分の評価（同じ星を再クリックで解除）">${stars}</div>
    <div class="ctx-seclabel">視聴状態の変更</div>
    <div class="ctx-states">${states}</div>
    ${epRow}
    <div class="ctx-divider"></div>
    <div class="ctx-item" onclick="openWiki(${id})">📖 Wikipediaで開く</div>
    ${a.os ? `<div class="ctx-item" onclick="openOfficial(${id})">🔗 公式サイトを開く</div>` : ""}
    ${a.pv ? `<div class="ctx-item" onclick="openPrime(${id})">▶️ プライム・ビデオで開く</div>` : ""}
    <div class="ctx-item" onclick="openAniList(${id})">🌐 AniListで開く</div>`;
}
function positionCtx() {
  const m = document.getElementById("ctxmenu");

}
function showCtxMenu(e, id) {
  e.preventDefault();

}
// 状態・評価を変更してもメニューは開いたまま再描画する。
function rebuildCtx(id) {
  const m = document.getElementById("ctxmenu");
  if (!m.classList.contains("show")) return;

  if (!a) return;

}
function pickStatus(id, status) {
  setStatus(id, status, epOf(id));
  renderStats(); updatePoster(id); rebuildCtx(id);
  toast(STATUS_JA[status] + " にしました");
}
function pickRating(id, n) {
  setRating(id, ratingOf(id) === n ? 0 : n);
  renderStats(); updatePoster(id); rebuildCtx(id);
}
function hideCtxMenu() {
  document.getElementById("ctxmenu").classList.remove("show");
}
document.addEventListener("click", hideCtxMenu);
document.addEventListener("contextmenu", e => { if (!e.defaultPrevented) hideCtxMenu(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") hideCtxMenu(); });
// 表示直後はスクロールで閉じない（慣性スクロールや遅延画像のレイアウト変動対策）
window.addEventListener("scroll", () => { if (Date.now() - ctxOpenedAt > 150) hideCtxMenu(); }, true);
window.addEventListener("resize", hideCtxMenu);

/* ---------- ホバー情報カード ---------- */
const WEEKDAY_JA = ["日", "月", "火", "水", "木", "金", "土"];
// d = 公開/発売/放映開始日(YYYYMMDD整数)。月日が 0 のものは粗い粒度で表示。
function fmtDateInt(d) {
  if (!d) return "";
  const y = Math.floor(d / 10000), m = Math.floor(d / 100) % 100, day = d % 100;
  if (!m) return `${y}年`;
  const mm = String(m).padStart(2, "0");
  if (!day) return `${y}/${mm}`;
  return `${y}/${mm}/${String(day).padStart(2, "0")}`;
}
// 情報カードの日付/時刻行。劇場=公開日 / OVA=発売日 / クール(TV・ショート)=放映日と時間。
function airInfoRow(a) {
  const row = (k, v) => `<div class="ic-row"><span class="ic-k">${k}</span>${v}</div>`;
  if (a.s === "MOVIE") return a.d ? row("公開日", fmtDateInt(a.d)) : "";
  if (a.s === "OVA") return a.d ? row("発売日", fmtDateInt(a.d)) : "";
  // クール作品: air(放送1話分のairingAt, unix秒UTC) があれば曜日・時刻まで表示。
  // JST固定表示にするため +9h して getUTC* で取り出す（閲覧者TZ非依存）。実時刻のまま表示。
  if (a.air) {
    const j = new Date(a.air * 1000 + 9 * 3600 * 1000);
    const date = `${j.getUTCFullYear()}/${String(j.getUTCMonth() + 1).padStart(2, "0")}/${String(j.getUTCDate()).padStart(2, "0")}`;
    const time = `${String(j.getUTCHours()).padStart(2, "0")}:${String(j.getUTCMinutes()).padStart(2, "0")}`;
    return row("放映", `${date}（${WEEKDAY_JA[j.getUTCDay()]}）${time}〜`);
  }
  // air 無し（旧作）は MAL の放送枠 bc=[曜日index, "HH:MM"] から毎週の放送枠を表示。
  if (Array.isArray(a.bc) && a.bc.length) {
    const t = a.bc[1] ? ` ${a.bc[1]}〜` : "";
    return row("放映", `毎週${WEEKDAY_JA[a.bc[0]]}曜${t}`);
  }
  if (a.d) return row("放映", `${fmtDateInt(a.d)} 放送開始`);
  return "";
}
function showInfo(e, id) {
  const a = catalog.find(x => x.id === id);
  if (!a) return;
  const card = document.getElementById("infocard");
  const ch = a.ch || [];
  const shown = ch.slice(0, 4);
  const chars = shown.map((c, i) => {
    const more = (i === shown.length - 1 && ch.length > 4) ? ' <span class="ic-more">…</span>' : "";
    const cv = c[1] ? ` <span class="ic-cv">${esc(c[1])}</span>` : "";
    return `<div class="ic-char">${esc(c[0])}${cv}${more}</div>`;
  }).join("");
  const airRow = airInfoRow(a);
  const myR = ratingOf(a.id), wSt = statusOf(a.id), wEp = epOf(a.id);
  const myRow = myR ? `<div class="ic-row"><span class="ic-k">自分評価</span><span style="color:#fcd34d">${"★".repeat(myR)}</span><span style="color:var(--text-faint)">${"★".repeat(5 - myR)}</span></div>` : "";
  const wRow = wSt === "watching" ? `<div class="ic-row"><span class="ic-k">視聴状況</span>視聴中${wEp ? `（${wEp}話まで）` : ""}</div>`
             : wSt === "dropped" ? `<div class="ic-row"><span class="ic-k">視聴状況</span>視聴中止${wEp ? `（${wEp}話で）` : ""}</div>` : "";
  card.innerHTML =
    `<div class="ic-title">${esc(a.t)}</div>` +
    (a.src ? `<div class="ic-row"><span class="ic-k">原作</span>${esc(a.src)}${a.nr ? ' <span class="ic-narou">なろう発</span>' : ""}</div>` : "") +
    (a.st ? `<div class="ic-row"><span class="ic-k">制作</span>${esc(a.st)}</div>` : "") +
    airRow +
    myRow + wRow +
    (chars ? `<div class="ic-chars">${chars}</div>` : "");
  card.classList.add("show");
  positionInfo(e.currentTarget, card);
}
function positionInfo(poster, card) {
  const pr = poster.getBoundingClientRect();
  const cr = card.getBoundingClientRect();
  let left = pr.right + 8;
  if (left + cr.width > window.innerWidth - 8) left = pr.left - cr.width - 8;
  if (left < 4) left = 4;
  let top = pr.top;
  if (top + cr.height > window.innerHeight - 8) top = window.innerHeight - cr.height - 8;
  if (top < 4) top = 4;
  card.style.left = left + "px";
  card.style.top = top + "px";
}
function hideInfo() {
  document.getElementById("infocard").classList.remove("show");
}

/* ---------- Wikipedia ---------- */
const WIKI_API = "https://ja.wikipedia.org/w/api.php?format=json&origin=*";
const wikiArticleUrl = t => `https://ja.wikipedia.org/wiki/${encodeURIComponent(t)}`;

// タイトルから日本語Wikipediaの記事URLを解決。
// opensearch は全角/半角・ダッシュ等の表記ゆれを吸収してくれるので、
// 結果から「タイトル (アニメ)」（アニメ専用ページ）→「タイトル」→ 先頭 の優先順で選ぶ。
// 該当記事が無い・通信失敗時は検索結果ページにフォールバック。
// AniListは期ごとに別レコードのため「第2期」等のサフィックス付きが多いが、
// Wikipediaは作品単位の記事が普通。ヒットしなければサフィックスを外して再解決する。
const SEASON_SUFFIX_RE = /\s*(第\s*\d+\s*(期|クール|シーズン|シリーズ)|シーズン\s*\d+|Season\s*\d+|\d+(?:st|nd|rd|th)\s+Season|Part\s*\d+|パート\s*\d+)\s*$/i;
async function resolveWikiUrl(title) {
  const stripped = title.replace(SEASON_SUFFIX_RE, "").trim();
  const queries = stripped && stripped !== title ? [title, stripped] : [title];
  try {
    for (const q of queries) {
      const r = await fetch(`${WIKI_API}&action=opensearch&redirects=resolve&limit=5&search=${encodeURIComponent(q)}`);
      const results = (await r.json())[1] || [];
      if (!results.length) continue;
      const norm = s => s.normalize("NFKC");
      const want = norm(q);
      const hit = results.find(t => norm(t) === `${want} (アニメ)`)
               || results.find(t => norm(t) === want)
               || results[0];
      return wikiArticleUrl(hit);
    }
  } catch (_) { /* オフライン等 → 検索ページへ */ }
  return `https://ja.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(title)}&go=Go`;
}
function openWiki(id) {
  hideCtxMenu();
  const a = catalog.find(x => x.id === id);
  if (!a) return;
  // ポップアップブロック回避: クリック時に同期で空タブを開き、解決後にURLを差し込む
  const w = window.open("about:blank", "_blank");
  if (w) w.opener = null;
  resolveWikiUrl(a.t || a.tr || "").then(url => {
    if (w && !w.closed) w.location.href = url;
    else window.open(url, "_blank", "noopener");
  });
}
function openAniList(id) {
  hideCtxMenu();
  window.open(`https://anilist.co/anime/${id}`, "_blank", "noopener");
}
function openOfficial(id) {
  hideCtxMenu();
  const a = catalog.find(x => x.id === id);
  if (a && a.os) window.open(a.os, "_blank", "noopener");
}
function openPrime(id) {
  hideCtxMenu();
  const a = catalog.find(x => x.id === id);
  if (a && a.pv) window.open(a.pv, "_blank", "noopener");
}
function updatePoster(id) {
  const a = catalog.find(x => x.id === id);
  if (!a) return;
  document.querySelectorAll(`.poster`).forEach(el => {
    if (el.getAttribute("onclick") === `cycle(${id})`) {
      const tmp = document.createElement("div");
      tmp.innerHTML = posterHtml(a);
      el.replaceWith(tmp.firstElementChild);
    }
  });
}

/* ---------- export（JSON / CSV / JPEG をまとめて選択） ----------
   書き出し形式メニューを開き、選んだ拡張子で保存する。 */
function openExportMenu(e) {
  e.preventDefault();
  e.stopPropagation();   // この click で document の閉じハンドラに伝播させない
  hideCtxMenu();
  const m = document.getElementById("exportmenu");
  m.innerHTML = `
    <div class="ctx-title">書き出し形式を選択</div>
    <div class="ctx-item" onclick="exportData('json')">🗎 JSON（バックアップ・読み込み用）</div>
    <div class="ctx-item" onclick="exportData('csv')">📊 CSV（表計算ソフト用）</div>
    <div class="ctx-item" onclick="exportData('jpeg')">🖼 JPEG（画像で保存）</div>`;
  m.classList.add("show");
  const r = m.getBoundingClientRect();
  m.style.left = Math.max(4, Math.min(e.clientX, window.innerWidth - r.width - 8)) + "px";
  m.style.top = Math.max(4, Math.min(e.clientY, window.innerHeight - r.height - 8)) + "px";
}
function hideExportMenu() { document.getElementById("exportmenu").classList.remove("show"); }
document.addEventListener("click", hideExportMenu);
document.addEventListener("keydown", e => { if (e.key === "Escape") hideExportMenu(); });

// ファイル保存の共通処理。File System Access API があれば「上書き保存」ダイアログを使い、
// 同じ名前（=同じ日付）のファイルを選べば (1) を付けずに上書きできる。
// 非対応ブラウザ（Firefox/Safari等）は従来のダウンロードにフォールバック。
async function saveFile(blob, filename, toastMsg) {
  if (window.showSaveFilePicker) {
    const ext = filename.slice(filename.lastIndexOf(".") + 1).toLowerCase();
    const accept = ext === "json" ? { "application/json": [".json"] }
                 : ext === "csv"  ? { "text/csv": [".csv"] }
                 : { "image/jpeg": [".jpg", ".jpeg"] };
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: ext.toUpperCase() + " ファイル", accept }],
      });
      const w = await handle.createWritable();
      await w.write(blob);
      await w.close();
      toast(toastMsg);
      return;
    } catch (e) {
      if (e && e.name === "AbortError") return;   // ユーザーがキャンセル
      // それ以外（権限拒否等）は従来方式にフォールバック
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  a.click(); URL.revokeObjectURL(url);
  toast(toastMsg);
}

function exportData(format) {
  hideExportMenu();
  const date = new Date().toISOString().slice(0, 10);
  if (format === "json") {
    const blob = new Blob([JSON.stringify(watch, null, 2)], { type: "application/json" });
    saveFile(blob, `anime-watch-${date}.json`, "JSONで書き出しました");
  } else if (format === "csv") {
    exportCsv(date);
  } else {
    exportImage(date);
  }
}

// CSV のセルをエスケープ（カンマ・改行・引用符を含む場合のみ "" で囲む）
function csvCell(v) {
  const s = String(v == null ? "" : v);
  return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function exportCsv(date) {
  const watched = catalog.filter(a => statusOf(a.id) !== "unwatched");
  if (watched.length === 0) { alert("マークした作品がありません。先に作品を視聴済/視聴中にしてください。"); return; }
  // 書き出しは視聴コレクションと同じく全年を逆順（秋→冬）で並べる。
  watched.sort((a, b) => b.y - a.y
    || (SEASON_ORDER_DISPLAY[a.s] ?? 9) - (SEASON_ORDER_DISPLAY[b.s] ?? 9)
    || (b.sc || 0) - (a.sc || 0));
  const head = ["ID", "タイトル", "原題", "年", "区分", "形式", "視聴状態", "視聴話数", "自分評価", "AniList評価"];
  const rows = watched.map(a => [
    a.id, a.t, a.tr || "", a.y, SEASON_JA[a.s] || a.s,
    FMT_JA[a.f] || a.f, STATUS_JA[statusOf(a.id)], epOf(a.id) || "", ratingOf(a.id) || "",
    a.sc ? (a.sc / 10).toFixed(1) : "",
  ]);
  const csv = [head, ...rows].map(r => r.map(csvCell).join(",")).join("\r\n");
  // 先頭に BOM を付け、Excel で日本語が文字化けしないようにする
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" });
  saveFile(blob, `anime-watch-${date}.csv`, "CSVで書き出しました");
}

function importWatch() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "application/json";
  inp.onchange = () => {
    const file = inp.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (typeof parsed !== "object" || Array.isArray(parsed)) throw new Error("形式が不正です");
        if (!confirm("現在の視聴データを読み込んだ内容で置き換えます。よろしいですか？")) return;
        watch = migrateWatch(parsed); saveWatch(); render();
        toast("読み込みました");
      } catch (e) { alert("読み込み失敗: " + e.message); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

/* ---------- export as JPEG image ----------
   AniListのポスター画像は他オリジンのためcanvasを汚染しJPEG化できない。
   そこで視聴済/視聴中タイトルをテキスト描画したまとめ画像を生成する。 */
function exportImage(date) {
  date = date || new Date().toISOString().slice(0, 10);
  const watched = catalog.filter(a => statusOf(a.id) !== "unwatched");
  if (watched.length === 0) { alert("マークした作品がありません。先に作品を視聴済/視聴中にしてください。"); return; }
  watched.sort((a, b) => b.y - a.y || (SEASON_ORDER_DISPLAY[a.s] ?? 9) - (SEASON_ORDER_DISPLAY[b.s] ?? 9) || (b.sc || 0) - (a.sc || 0));

  const byYear = {};
  for (const a of watched) (byYear[a.y] = byYear[a.y] || []).push(a);
  const ys = Object.keys(byYear).map(Number).sort((x, y) => y - x);

  const W = 920, pad = 40, lineH = 30, yearHeadH = 40, yearGap = 14, headerH = 150;
  let bodyH = 0;
  for (const y of ys) bodyH += yearHeadH + byYear[y].length * lineH + yearGap;
  const H = headerH + bodyH + pad;

  const scale = 2;
  const canvas = document.createElement("canvas");
  canvas.width = W * scale; canvas.height = H * scale;
  const ctx = canvas.getContext("2d");
  ctx.scale(scale, scale);
  const JP = '"Yu Gothic UI","Meiryo","Hiragino Kaku Gothic ProN",sans-serif';

  ctx.fillStyle = "#0d0e12"; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#7c5cff"; ctx.fillRect(0, 0, W, 6);

  ctx.fillStyle = "#e8eaef"; ctx.font = `800 34px ${JP}`;
  ctx.fillText("アニメ視聴コレクション", pad, 64);

  let done = 0, wat = 0;
  for (const id in watch) { const v = (watch[id] || {}).s; if (v === "done") done++; else if (v === "watching") wat++; }
  ctx.font = `700 18px ${JP}`;
  ctx.fillStyle = "#34d399"; ctx.fillText(`✓ 視聴済 ${done}`, pad, 102);
  ctx.fillStyle = "#fbbf24"; ctx.fillText(`▶ 視聴中 ${wat}`, pad + 170, 102);
  ctx.fillStyle = "#5f6675"; ctx.font = `400 14px ${JP}`;
  ctx.fillText(`${date} 書き出し ／ 全${watched.length}作品`, pad, 128);

  let yy = headerH;
  for (const y of ys) {
    ctx.fillStyle = "#a48bff"; ctx.font = `800 22px ${JP}`;
    ctx.fillText(`${y}年`, pad, yy + 22);
    yy += yearHeadH;
    for (const a of byYear[y]) {
      const st = statusOf(a.id);
      ctx.fillStyle = st === "done" ? "#34d399" : st === "maybe" ? "#38bdf8" : st === "dropped" ? "#f87171" : st === "planning" ? "#f472b6" : "#fbbf24";
      ctx.font = `700 15px ${JP}`;
      ctx.fillText(st === "done" ? "✓" : st === "maybe" ? "?" : st === "dropped" ? "×" : st === "planning" ? "▷" : "▶", pad, yy + 16);
      ctx.fillStyle = "#e8eaef"; ctx.font = `400 16px ${JP}`;
      let title = a.t;
      const maxW = W - pad * 2 - 90;
      while (ctx.measureText(title).width > maxW && title.length > 4) title = title.slice(0, -1);
      if (title !== a.t) title += "…";
      ctx.fillText(title, pad + 26, yy + 16);
      ctx.fillStyle = "#5f6675"; ctx.font = `400 13px ${JP}`;
      ctx.textAlign = "right";
      ctx.fillText(`${a.y} ${SEASON_JA[a.s] || a.s}`, W - pad, yy + 16);
      ctx.textAlign = "left";
      yy += lineH;
    }
    yy += yearGap;
  }

  canvas.toBlob(b => {
    if (!b) { alert("画像の生成に失敗しました。"); return; }
    saveFile(b, `anime-collection-${date}.jpg`, "画像を書き出しました");
  }, "image/jpeg", 0.92);
}
